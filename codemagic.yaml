workflows:
  ios_testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: MediaHouseEdge

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mediahouse.edge

      vars:
        BUNDLE_ID: com.mediahouse.edge
        APP_STORE_APPLE_ID: 6762801853

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      # 🔥 أهم خطوة (تحل مشكلتك)
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Set build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)

          if [ -z "$LATEST_BUILD_NUMBER" ]; then
            IOS_BUILD_NUMBER="$PROJECT_BUILD_NUMBER"
          else
            IOS_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          fi

          echo "IOS_BUILD_NUMBER=$IOS_BUILD_NUMBER" >> "$CM_ENV"

      - name: Build IPA
        script: |
          flutter build ipa --release --build-number="$IOS_BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false