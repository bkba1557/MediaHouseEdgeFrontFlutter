name: mediahouse
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 2.0.0+26

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.0.5
  image_picker: ^1.0.4
  crop_your_image: ^2.0.0
  video_player: ^2.7.2
  chewie: ^1.8.5
  cached_network_image: ^3.3.0
  flutter_svg: ^2.1.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.20.2
  socket_io_client: ^2.0.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/login_google.png
    - assets/images/login_apple.png
    - assets/videos/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo.ttf
    - family: Petrichor
      fonts:
        - asset: assets/fonts/ZYAEA-Petrichor.ttf
          weight: 400
        - asset: assets/fonts/ZYAEA-Petrichor.ttf
          weight: 500
        - asset: assets/fonts/ZYAEA-Petrichor.ttf
          weight: 600
        - asset: assets/fonts/ZYAEA-Petrichor.ttf
          weight: 700
        - asset: assets/fonts/ZYAEA-Petrichor.ttf
          weight: 800
        - asset: assets/fonts/ZYAEA-Petrichor.ttf
          weight: 900
